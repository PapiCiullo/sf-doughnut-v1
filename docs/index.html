<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Francisco Doughnut Economics Portrait</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e5e5e5; }
        .active { background-color: #059669 !important; color: white !important; }
    </style>
</head>
<body class="p-6">
    <header class="max-w-4xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white">San Francisco Doughnut Economics</h1>
            <p class="text-sm text-gray-400">A classic portrait of social and ecological wellbeing</p>
        </div>
        <div class="flex gap-2">
            <button class="active px-4 py-2 bg-gray-800 text-gray-300 rounded text-sm font-medium">San Francisco County</button>
            <a href="index-d3.html" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-medium transition">D3 Interactive View →</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 flex justify-center items-center bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-xl">
            <canvas id="doughnutCanvas" width="500" height="500" class="max-w-full"></canvas>
        </div>

        <div id="details-panel" class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
            <h2 id="dimension-name" class="text-xl font-bold text-white mb-2">Hover a segment</h2>
            <p id="dimension-meta" class="text-sm text-emerald-400 mb-4"></p>
            <div id="dimension-content" class="text-sm text-gray-300 space-y-3">
                <p>Hover over any section of the social foundation or ecological ceiling to view San Francisco's current metrics, target boundaries, and localized community actions.</p>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
